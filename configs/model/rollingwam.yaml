_target_: rollingwam.runtime.create_rollingwam
model_id: Wan-AI/Wan2.2-TI2V-5B
tokenizer_model_id: Wan-AI/Wan2.1-T2V-1.3B
tokenizer_max_len: 128
load_text_encoder: false
proprio_dim: ${data.train.processor.proprio_output_dim}
redirect_common_files: true
mot_checkpoint_mixed_attn: true
action_dit_pretrained_path: checkpoints/ActionDiT_linear_interp_Wan22_alphascale_1024hdim.pt
skip_dit_load_from_pretrain: false

video_dit_config:
  has_image_input: false
  patch_size: [1, 2, 2]
  in_dim: 48
  hidden_dim: 3072
  ffn_dim: 14336
  freq_dim: 256
  text_dim: 4096
  out_dim: 48
  num_heads: 24
  attn_head_dim: 128
  num_layers: 30
  eps: 1.0e-06
  seperated_timestep: true
  require_clip_embedding: false
  require_vae_embedding: false
  fuse_vae_embedding_in_latents: true
  use_gradient_checkpointing: ${model.mot_checkpoint_mixed_attn}
  video_attention_mask_mode: "bidirectional"  # rolling mask is built by the model
  action_conditioned: false
  action_dim: ${data.train.processor.action_output_dim}
  action_group_causal_mask_mode: "group_diagonal"

action_dit_config:
  action_dim: ${data.train.processor.action_output_dim}
  hidden_dim: 1024
  ffn_dim: 4096
  num_heads: 24
  attn_head_dim: 128
  num_layers: 30
  text_dim: 4096
  freq_dim: 256
  eps: 1.0e-06
  use_gradient_checkpointing: ${model.mot_checkpoint_mixed_attn}

video_scheduler:
  train_shift: 5.0
  infer_shift: 5.0
  num_train_timesteps: 1000

action_scheduler:
  train_shift: 5.0
  infer_shift: 5.0
  num_train_timesteps: 1000

loss:
  lambda_action: 1.0

# Rolling window: W chunks denoised jointly under a diagonal ramp, conditioned on
# [1-frame anchor | H clean context chunks]. Data must deliver 1 + 4*chunk_latents*(W+H)
# VIDEO frames to the model (raw num_frames = that * action_video_freq_ratio, see task yaml).
# actions_per_chunk = action_horizon / (W+H) = 4*chunk_latents*action_video_freq_ratio.
rolling:
  window_blocks: 4
  num_context_chunks: 0  # 0 = latest-frame conditioning only; >0 adds GT history chunks
  chunk_latents: 1
  actions_per_chunk: 16
  video_attends_actions: true
  num_inference_steps: 12  # must be divisible by window_blocks;
  use_phase_offset: true
  partial_window_prob: 0.35
  partial_context_prob: 0.0  # only meaningful when num_context_chunks > 0
