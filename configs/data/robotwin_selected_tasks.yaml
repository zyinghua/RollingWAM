defaults:
  - robotwin
  - _self_

# Which demonstrations to use for the selected tasks:
#   clean                 -> 50 demo_clean episodes per task
#   clean_and_randomized  -> 50 demo_clean + 500 demo_randomized episodes per task
# The released archive omits source-path labels. For clean mode, the loader
# verifies its official 27,500-episode layout (550 contiguous episodes/task)
# before taking the first 50 clean episodes from each selected task block.
selected_task_data_mode: clean
# Keep this consistent with selected_task_data_mode for the released dataset
# (50 for clean; 550 for clean_and_randomized). This is a fail-fast check.
expected_episodes_per_task: 50
dataset_root: /datasets/robotwin2.0-fastwam/robotwin2.0
# This list is the only task selection to edit. The cache path for each task is
# derived automatically as: ${data.text_embedding_cache_root}/<task_name>.
selected_task_names:
  - lift_pot
  - beat_block_hammer
  - put_object_cabinet
text_embedding_cache_root: /datasets/robotwin2.0-fastwam/text_embeds_cache

train:
  task_names: ${data.selected_task_names}
  selected_task_data_mode: ${data.selected_task_data_mode}
  task_text_embedding_cache_root: ${data.text_embedding_cache_root}
  expected_episodes_per_task: ${data.expected_episodes_per_task}
  dataset_dirs:
    - ${data.dataset_root}
  # Compute normalization statistics from the selected tasks on the first run.
  pretrained_norm_stats: null
  text_embedding_cache_dir: ${data.text_embedding_cache_root}

val:
  task_names: ${data.selected_task_names}
  selected_task_data_mode: ${data.selected_task_data_mode}
  task_text_embedding_cache_root: ${data.text_embedding_cache_root}
  expected_episodes_per_task: ${data.expected_episodes_per_task}
  dataset_dirs:
    - ${data.dataset_root}
  # The runtime reuses the statistics generated by the training dataset.
  pretrained_norm_stats: null
  text_embedding_cache_dir: ${data.text_embedding_cache_root}
