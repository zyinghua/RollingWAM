train:
  _target_: rollingwam.datasets.lerobot.robot_video_dataset.RobotVideoDataset
  dataset_dirs:
    - ./data/robotwin2.0/robotwin2.0
  shape_meta:
    images:
      - key: cam_high
        raw_shape: [3, 480, 640]
        shape: [3, 240, 320]
      - key: cam_left_wrist
        raw_shape: [3, 480, 640]
        shape: [3, 240, 320]
      - key: cam_right_wrist
        raw_shape: [3, 480, 640]
        shape: [3, 240, 320]
    action:
      - key: default
        raw_shape: 14 # before transform
        shape: 14 # after transform
    state:
      - key: default
        raw_shape: 14 # before transform
        shape: 14 # after transform
  num_frames: 33
  global_sample_stride: 1
  action_video_freq_ratio: 4 # 32 action, 9 video frames
  video_size: [384, 320] # final resize video
  camera_key: null
  val_set_proportion: 0.01
  is_training_set: true
  pretrained_norm_stats: ./data/robotwin2.0/dataset_stats.json
  skip_padding_as_possible: false
  concat_multi_camera: "robotwin"
  processor:
    _target_: rollingwam.datasets.lerobot.processors.rollingwam_processor.RollingWAMProcessor
    shape_meta: ${data.train.shape_meta}
    num_obs_steps: ${data.train.num_frames}
    num_output_cameras: 3
    action_output_dim: 14
    proprio_output_dim: 14

    # action & state normalization
    action_state_transforms: null
    # action_state_transforms:
    #   - _target_: rollingwam.datasets.lerobot.transforms.libero.LiberoTransform
    use_stepwise_action_norm: False
    norm_default_mode: "z-score"
    norm_exception_mode: null

    action_state_merger:
      _target_: rollingwam.datasets.lerobot.transforms.action_state_merger.ConcatLeftAlign

    train_transforms:
      - _target_: rollingwam.datasets.lerobot.transforms.image.ToTensor
      - _target_: torchvision.transforms.Resize
        size: [240, 320]
    val_transforms:
      - _target_: rollingwam.datasets.lerobot.transforms.image.ToTensor
      - _target_: torchvision.transforms.Resize
        size: [240, 320]
  text_embedding_cache_dir: ./data/text_embeds_cache/robotwin
  context_len: 128

val:
  _target_: rollingwam.datasets.lerobot.robot_video_dataset.RobotVideoDataset
  dataset_dirs:
